<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>She Can Foundation</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(to right, #f8f9fa, #e3f2fd);
            text-align: center;
        }

        header {
            background: #6a1b9a;
            color: white;
            padding: 25px;
        }

        header h1 {
            font-size: 40px;
        }

        .designer {
            margin-top: 10px;
            font-size: 18px;
        }

        .container {
            padding: 40px 20px;
        }

        h2 {
            color: #6a1b9a;
            margin-bottom: 20px;
        }

        p {
            max-width: 800px;
            margin: auto;
            line-height: 1.8;
            color: #444;
            font-size: 18px;
        }

        img {
            width: 350px;
            border-radius: 12px;
            margin: 25px 0;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        }

        button {
            background: #6a1b9a;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #4a148c;
            transform: scale(1.05);
        }

        footer {
            background: #222;
            color: white;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <header>
        <h1>She Can Foundation</h1>
    </header>

    <div class="container">

        <h2>Empowering Women, Building a Better Future</h2>

        <p>
            She Can Foundation is a non-profit organization dedicated to
            empowering women and creating opportunities through education,
            skill development, and community support.
        </p>

        <img src="https://images.unsplash.com/photo-1517048676732-d65bc937f952?w=600" alt="Women Empowerment">

        <br>

        <button onclick="showMessage()">Learn More</button>

    </div>

    <footer>
        © 2026 She Can Foundation | Developed - by Aditya
    </footer>

    <script>
        function showMessage() {
            alert("Thank you for visiting She Can Foundation!");
        }
    </script>

</body>

</html>
